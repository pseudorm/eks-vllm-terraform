
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ .Values.nodes.name }}
spec:
  template:
    metadata:
      {{- if .Values.nodes.labels }}
      labels:
        {{- toYaml .Values.nodes.labels | nindent 8 }}
      {{- end }}
    spec:
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values: {{- toYaml .Values.nodes.instanceTypes | nindent 12 }} 
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: {{- toYaml .Values.nodes.capacityTypes | nindent 12 }} 
      nodeClassRef:
        name: {{ .Values.nodes.name }}
        group: karpenter.k8s.aws
        kind: EC2NodeClass
      expireAfter: 720h
  limits:
    cpu: {{ .Values.nodes.limits.cpu | default "10" }}
    memory: {{ .Values.nodes.limits.memory | default "32Gb" }}
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: {{ .Values.nodes.disruption.consolidateAfter | default "5m" }}

---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: {{ .Values.nodes.name }}
spec:
  amiFamily: {{ .Values.nodes.amiFamily }}
  amiSelectorTerms:
    - id: {{ .Values.nodes.amiId }}
  role: {{ .Values.nodes.iamRole }}
  {{- with .Values.nodes.blockDeviceMappings }}
  blockDeviceMappings:
    {{- range . }}
    - deviceName: {{ .deviceName }}
      ebs:
        volumeSize: {{ .volumeSize }}
        volumeType: {{ .volumeType }}
        {{- if .encrypted }}
        encrypted: {{ .encrypted }}
        {{- end }}
    {{- end }}
  {{- end }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.cluster.name }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.cluster.name }}
  tags:
    nvidia.com/gpu: "false"